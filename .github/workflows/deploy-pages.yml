name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'backend/**'
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        # BASE is "/<repo>/" for a project site, "/" for a user site.
        # PUBLIC_CHAT_API is baked into the bundle at build time, so changing
        # the backend URL needs a site rebuild, not just a backend redeploy.
        env:
          SITE: ${{ vars.SITE }}
          BASE: ${{ vars.BASE }}
          PUBLIC_CHAT_API: ${{ vars.PUBLIC_CHAT_API }}
        run: make build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
