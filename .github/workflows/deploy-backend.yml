name: Deploy chat backend to Modal

on:
  push:
    branches:
      - main
    paths:
      # Content is baked into the backend image as the search index, so an
      # edit there needs a redeploy or the assistant keeps citing old content.
      - 'backend/**'
      - 'src/content/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: modal-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Modal
        run: pip install -r backend/requirements.txt

      - name: Deploy to Modal
        # The image build embeds the allowed origins, downloads the model
        # weights and builds the search index, so the first deploy after a
        # dependency change takes several minutes. Later ones hit the layer
        # cache and only rebuild the index.
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: make deploy
